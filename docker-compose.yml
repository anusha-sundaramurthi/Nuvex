services:
  chat_ui:
    build:
      context: .
      dockerfile: apps/chat_ui/Dockerfile
    ports:
      - 8501:8501
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./apps/chat_ui/src:/app/apps/chat_ui/src
    environment:
      - HOME=/tmp
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    networks:
      - nuvex-network

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - 8000:8000
    env_file:
      - .env
    restart: unless-stopped
    volumes:
      - ./apps/api/src:/app/apps/api/src
    networks:
      - nuvex-network
    depends_on:
      - postgres
      - qdrant

  qdrant:
    image: qdrant/qdrant
    ports:
      - 6333:6333
      - 6334:6334
    volumes:
      - ./qdrant_storage:/qdrant/storage:z
    restart: unless-stopped
    networks:
      - nuvex-network

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: langgraph_user
      POSTGRES_PASSWORD: langgraph_password
      POSTGRES_DB: langgraph_db
    ports:
      - 5433:5432
    restart: unless-stopped
    networks:
      - nuvex-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/sql:/docker-entrypoint-initdb.d

  items_mcp_server:
    build:
      context: .
      dockerfile: apps/items_mcp_server/Dockerfile
    ports:
      - 8001:8000
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - nuvex-network
    depends_on:
      - qdrant

  reviews_mcp_server:
    build:
      context: .
      dockerfile: apps/reviews_mcp_server/Dockerfile
    ports:
      - 8002:8000
    env_file:
      - .env
    restart: unless-stopped
    networks:
      - nuvex-network
    depends_on:
      - qdrant

networks:
  nuvex-network:
    driver: bridge

volumes:
  postgres_data: